name: Uptime Monitor

# Production health check — runs every 5 minutes during founder pause.
# On failure: opens a GitHub Issue (founder gets email via GitHub notifications).
# Set up: 2026-05-10 freeze prep S161. Replaces UptimeRobot manual setup.
#
# To pause monitoring temporarily: comment out the schedule trigger below.
# To change check interval: edit the cron expression (5-minute minimum on free GitHub Actions).

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch: {}    # allow manual run via Actions tab

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe homepage
        id: homepage
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /tmp/body.html -w "%{http_code}" --max-time 30 https://mytheai.com)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Homepage HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "homepage_failed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if ! grep -q "MytheAi" /tmp/body.html; then
            echo "Body missing 'MytheAi' marker — likely error page or redirect"
            echo "homepage_failed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "homepage_failed=false" >> $GITHUB_OUTPUT

      - name: Probe critical tool page
        id: tool
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://mytheai.com/tools/claude)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Tool page HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "tool_failed=true" >> $GITHUB_OUTPUT
          else
            echo "tool_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Probe critical money page
        id: best
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://mytheai.com/best/coding)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Best page HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "best_failed=true" >> $GITHUB_OUTPUT
          else
            echo "best_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Open issue on failure
        if: steps.homepage.outputs.homepage_failed == 'true' || steps.tool.outputs.tool_failed == 'true' || steps.best.outputs.best_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const home = '${{ steps.homepage.outputs.status }}';
            const tool = '${{ steps.tool.outputs.status }}';
            const best = '${{ steps.best.outputs.status }}';
            const date = new Date().toISOString();

            // Check for existing open uptime issue (avoid duplicates within same outage)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Still failing at ${date}\n\n- Homepage: HTTP ${home}\n- /tools/claude: HTTP ${tool}\n- /best/coding: HTTP ${best}`,
              });
              console.log(`Updated existing issue #${issue.number}`);
              return;
            }

            const body = [
              `## Production health check failed at ${date}`,
              ``,
              `**Probe results:**`,
              `- https://mytheai.com — HTTP ${home}`,
              `- https://mytheai.com/tools/claude — HTTP ${tool}`,
              `- https://mytheai.com/best/coding — HTTP ${best}`,
              ``,
              `**Likely cause:** Vercel env vars wiped (see CLAUDE.md S159 incident, RUNBOOK.md Scenario 1).`,
              ``,
              `**Quick fix:**`,
              `1. Open https://vercel.com/mytheais-projects/project-71zh9/deployments`,
              `2. If latest deploy failed with "supabaseUrl is required" → restore env vars per RUNBOOK.md Scenario 1`,
              `3. If latest deploy ready but site still 5xx → check Supabase status at https://status.supabase.com`,
              ``,
              `This issue will be closed automatically when the next health check passes.`,
            ].join('\n');

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Uptime] Production failing — homepage HTTP ${home}`,
              body,
              labels: ['uptime', 'incident'],
            });
            console.log(`Opened issue #${created.data.number}`);

      - name: Auto-close uptime issues on recovery
        if: steps.homepage.outputs.homepage_failed != 'true' && steps.tool.outputs.tool_failed != 'true' && steps.best.outputs.best_failed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime',
              per_page: 10,
            });
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Recovered at ${new Date().toISOString()}. All probes green.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              console.log(`Closed recovered issue #${issue.number}`);
            }

      - name: Fail workflow if any probe failed
        if: steps.homepage.outputs.homepage_failed == 'true' || steps.tool.outputs.tool_failed == 'true' || steps.best.outputs.best_failed == 'true'
        run: exit 1
